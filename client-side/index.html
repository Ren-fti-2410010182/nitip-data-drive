<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitip Data Drive - Storage Cloud</title>
    <link rel="stylesheet" href="Asset/ui.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo">
                <span class="material-icons">cloud</span>
                <span>Nitip Data Drive</span>
            </div>
        </div>
        <div class="header-center">
            <div class="search-bar">
                <input type="text" placeholder="Cari file...">
                <button><span class="material-icons">search</span></button>
            </div>
        </div>
        <div class="header-right">
            <button class="user-icon"><span class="material-icons">account_circle</span></button>
        </div>
    </header>
    
    <div class="container">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li class="active"><span class="material-icons">folder</span> My Drive</li>
                    <li><span class="material-icons">access_time</span> Recent</li>
                    <li><span class="material-icons">star</span> Starred</li>
                    <li><span class="material-icons">delete</span> Trash</li>
                </ul>
            </nav>
        </aside>
        
        <main>
            <div class="toolbar">
                <button id="upload-btn"><span class="material-icons">add</span> New</button>
                <input type="file" id="file-input" multiple style="display: none;">
            </div>
            <div class="files-grid" id="files-grid">
                <!-- Files will be displayed here -->
            </div>
        </main>
    </div>
    
    <script src="Asset/logic.js"></script>
</body>
</html>
